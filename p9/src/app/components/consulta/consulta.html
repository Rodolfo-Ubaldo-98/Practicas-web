<div class="container mt-3">
  <h2>Lista de Alumnos</h2>
  <table class="table table-dark table-striped">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Edad</th>
        <th>Carrera</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let alumno of listaAlumnos">
        <td>{{alumno.nombre}}</td>
        <td>{{alumno.edad}}</td>
        <td>{{alumno.carrera}}</td>
      </tr>
    </tbody>
  </table>
  <a routerLink="/formulario" class="btn btn-primary">Agregar Alumno</a>
</div>
